name: "Taska OS - Build ISO"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-iso:
    name: Compilar ISO de Taska OS
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
      options: --privileged

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias de compilacion
        run: |
          apt-get update -qq
          apt-get install -y \
            live-build debootstrap squashfs-tools \
            xorriso isolinux syslinux-efi \
            grub-pc-bin grub-efi-amd64-bin \
            mtools curl wget gnupg ca-certificates git sudo

      - name: Importar clave GPG de Liquorix
        run: |
          mkdir -p taska-live-build/config/archives
          curl -s 'https://liquorix.net/liquorix-keyring.gpg' | \
            gpg --batch --yes --dearmor \
            -o taska-live-build/config/archives/liquorix.key.chroot

      - name: Preparar estructura de directorios (ANTES de lb config)
        working-directory: taska-live-build
        run: |
          mkdir -p config/package-lists
          mkdir -p config/archives
          mkdir -p config/includes.chroot/etc/sysctl.d
          mkdir -p config/includes.chroot/etc/default
          mkdir -p config/includes.chroot/etc/lightdm
          mkdir -p config/includes.chroot/etc/profile.d
          mkdir -p config/includes.chroot/etc/skel/.config/openbox
          mkdir -p config/includes.chroot/etc/skel/.config/tint2
          mkdir -p config/includes.chroot/etc/skel/.config/rofi
          mkdir -p config/includes.chroot/etc/skel/.config/picom
          mkdir -p config/includes.chroot/usr/share/backgrounds
          mkdir -p config/includes.chroot/usr/share/applications
          mkdir -p config/hooks/normal
          chmod -R 777 config/

      - name: Configurar live-build
        working-directory: taska-live-build
        run: |
          lb config \
            --binary-image iso-hybrid \
            --distribution bookworm \
            --archive-areas "main contrib non-free non-free-firmware" \
            --bootappend-live "boot=live components locales=es_ES.UTF-8 keyboard-layouts=es timezone=UTC quiet splash" \
            --apt-recommends false \
            --debian-installer false \
            --memtest none

      - name: Compilar Taska OS ISO
        working-directory: taska-live-build
        run: |
          lb build 2>&1 | tee ../taska-build.log

      - name: Preparar ISO para publicar
        id: prep
        run: |
          DATE=$(date +%Y%m%d)
          SHA=$(echo $GITHUB_SHA | cut -c1-7)
          NAME="taska-os-${DATE}-${SHA}-amd64.iso"
          SRC=$(find taska-live-build -name "*.iso" | head -1)
          if [ -z "$SRC" ]; then echo "ERROR: No se genero la ISO"; exit 1; fi
          mv "$SRC" "$NAME"
          sha256sum "$NAME" > "${NAME}.sha256"
          echo "iso=$NAME"  >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          ls -lh "$NAME"

      - name: Subir ISO como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: taska-os-${{ steps.prep.outputs.date }}
          path: |
            ${{ steps.prep.outputs.iso }}
            ${{ steps.prep.outputs.iso }}.sha256
          retention-days: 30

      - name: Subir log de compilacion
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ steps.prep.outputs.date }}
          path: taska-build.log
          retention-days: 7

      - name: Publicar Release con la ISO
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-${{ steps.prep.outputs.date }}
          name: "Taska OS v1.0 - Build ${{ steps.prep.outputs.date }}"
          body: |
            ## Taska OS v1.0
            - Base: Debian 12 Bookworm
            - Kernel: Liquorix amd64
            - Escritorio: Openbox + Tint2 + Rofi
            - Ofimatica: LibreOffice Suite completa
            - Navegador: Firefox ESR
            - Optimizaciones USB: ZRAM, tmpfs, swappiness=10

            Instala con BalenaEtcher: https://etcher.balena.io
          files: |
            ${{ steps.prep.outputs.iso }}
            ${{ steps.prep.outputs.iso }}.sha256
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
